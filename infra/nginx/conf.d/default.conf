# ──────────────────────────────────────────────
# nginx — default.conf
#
# Two server blocks:
#   1) www.DOMAIN  → Frontend (React static site)
#   2) api.DOMAIN  → Gateway (.NET reverse proxy)
#
# Replace PLACEHOLDER: example.com with your real domain.
# ──────────────────────────────────────────────

# ── HTTP → HTTPS redirect ──────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.localhost api.localhost;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# ── Frontend: www.DOMAIN ───────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.localhost localhost;

    # ── SSL (mount via docker-compose volumes) ──
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Proxy to frontend container ──
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── API Gateway: api.DOMAIN ────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.localhost;

    # ── SSL ──
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Proxy to Gateway ──
    location / {
        proxy_pass         http://gateway:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
