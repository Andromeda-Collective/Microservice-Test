# ──────────────────────────────────────────────
# nginx — default.conf (FIXED)
# ──────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;

    server_name www.localhost api.localhost localhost;

    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────
# FRONTEND (React)
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name www.localhost localhost;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ──────────────────────────────────────────────
# API GATEWAY
# ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name api.localhost;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # IMPORTANT: API routing
    location / {
        proxy_pass http://gateway:8080;

        # مهم‌ترین fix برای Django / microservices
        proxy_set_header Host gateway;

        # preserve original request info
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}