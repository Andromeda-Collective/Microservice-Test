<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservice-test - API Documentation</title>
    <style>
        body { margin: 0; padding: 0; }
        #opencollection-container { width: 100vw; height: 100vh; }
    </style>
    <link rel="stylesheet" href="https://cdn.opencollection.com/docs.css">
    <script src="https://cdn.opencollection.com/docs.js"></script>
</head>
<body>
    <div id="opencollection-container"></div>
    <script>
        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: Microservice-test\nconfig:\n  proxy:\n    inherit: true\n    config:\n      protocol: http\n      hostname: ''\n      port: ''\n      auth:\n        username: ''\n        password: ''\n      bypassProxy: ''\n  environments:\n    - name: Andromeda\n      variables:\n        - name: baseURL\n          value: https://api.localhost\n        - name: refreshToken\n          secret: true\n        - name: token\n          secret: true\n        - name: authURL\n          value: '{{baseURL}}/auth'\n        - name: userId\n          secret: true\n        - name: username\n          secret: true\nitems:\n  - info:\n      name: Auth\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    items:\n      - info:\n          name: login\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{authURL}}/login'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"username\": \"\",\n                \"password\": \"\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body.jwtToken) {\n                  bru.setEnvVar(\"token\", res.body.jwtToken);\n                }\n                if (res.refreshToken) {\n                  res.body.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                }\n                if (res.body.userId) {\n                  bru.setEnvVar(\"userId\", res.body.userId);\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Authenticates a user and returns a JWT access token along with a refresh token, username and userId.\n\n          ## Request\n\n          Headers: Content-Type: application/json (Required)\n\n          Body:\n          - username: string, Required, 3-50 chars, starts with a letter, only letters/digits/underscores\n          - password: string, Required, 8-20 chars\n\n          Example Request:\n            {\n              \"username\": \"john_doe\",\n              \"password\": \"mypassword123\"\n            }\n\n          ## Responses\n\n          200 OK:\n            {\n              \"userId\": \"3fa85f64-...\",\n              \"jwtToken\": \"eyJhbGci...\",\n              \"userName\": \"john_doe\",\n              \"refreshToken\": \"d4f9a2...\"\n            }\n\n          400 Validation Errors\n          404 Not Found\n          409 Conflict\n\n          ## Notes\n          - Store the refreshToken securely \u2014 it is required to obtain a new access token via POST /auth/tokens/refresh.\n          - JWT tokens expire based on server configuration (JWTConfig:TimeoutInMin).\n      - info:\n          name: register\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{authURL}}/register'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"username\": \"\",\n                \"firstName\": \"\",\n                \"lastName\": \"\",\n                \"password\": \"\",\n                \"confirmPassword\": \"\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Registers a new user account.\n\n          ## Request\n\n          Headers: Content-Type: application/json (Required)\n\n          Body:\n          - username: string, Required, 3-50 chars, starts with a letter, only letters/digits/underscores\n          - firstName: string, Required, 3-50 chars\n          - lastName: string, Required, 3-50 chars\n          - password: string, Required, 8-20 chars\n          - confirmPassword: string, Required, must match password\n\n          Example Request:\n            {\n              \"username\": \"john_doe\",\n              \"firstName\": \"John\",\n              \"lastName\": \"Doe\",\n              \"password\": \"mypassword123\",\n              \"confirmPassword\": \"mypassword123\"\n            }\n\n          ## Responses\n\n          200 OK: (empty body)\n\n          400 Validation Errors\n          404 Not Found\n          409 Conflict\n\n          ## Notes\n          - No authentication token is returned upon registration. Call POST /auth/login after registering to obtain tokens.\n          - confirmPassword must exactly match password.\n      - info:\n          name: refresh\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{authURL}}/tokens/refresh'\n          headers:\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                if (res.body.jwtToken) {\n                  bru.setEnvVar(\"token\", res.body.jwtToken);\n                }\n                if (res.body.refreshToken) {\n                  bru.setEnvVar(\"refreshToken\", res.body.refreshToken);\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Issues a new JWT access token and refresh token using a valid refresh token.\n\n          ## Request\n\n          Headers: Content-Type: application/json (Required)\n\n          Body:\n          - refreshToken: string, Required\n\n          Example Request:\n            {\n              \"refreshToken\": \"d4f9a2...\"\n            }\n\n          ## Responses\n\n          200 OK:\n            {\n              \"jwtToken\": \"eyJhbGci...\",\n              \"refreshToken\": \"e7g3b1...\"\n            }\n\n          400 Validation Error\n\n          409 Conflict\n\n          ## Notes\n          - Both jwtToken and refreshToken are rotated on each refresh call. Update stored values accordingly.\n          - If refresh fails, the user must log in again via POST /auth/login.\nrequest:\n  auth:\n    type: bearer\n    token: '{{token}}'\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    presets:\n      requestType: http\n      requestUrl: '{{baseURL}}'\n    exportedAt: '2026-06-29T15:15:10.913Z'\n    exportedUsing: Bruno/3.4.2\n";
        new window.OpenCollection({
            target: document.getElementById('opencollection-container'),
            opencollection: collectionData,
            theme: 'light'
        });
    </script>
</body>
</html>
